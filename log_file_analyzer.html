<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log File Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px;
            font-size: 16px;
            overflow: hidden;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            background: linear-gradient(180deg, rgba(0,0,0,0.2), rgba(0,0,0,0.12)), url('https://images.fastcompany.com/image/upload/f_webp,q_auto,c_fit/wp-cms/uploads/2012/08/1280-ecoli.jpg');
            background-size: cover;
            background-position: center top;
            border-radius: 16px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            height: calc(100vh - 60px);
        }

        .header {
            background: transparent;
            color: white;
            padding: 25px;
            text-align: center;
            background: rgba(0, 0, 0, 0.22);
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 1.9;
            font-size: 16px;
        }

        .upload-section {
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.22);
            color: white;
        }

        .upload-btn {
            background: #fdb813;
            color: black;
            padding: 12px 35px;
            border-radius: 8px;
            border: 2px solid #fdb813;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            filter: brightness(0.95);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            padding: 10px 25px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 14px;
            color: #6c757d;
            margin-top: 8px;
            text-transform: uppercase;
        }

        .stat-item.errors .stat-value {
            color: #dc3545;
        }

        .stat-item.warnings .stat-value {
            color: #ffc107;
        }

        .filters {
            padding: 15px 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #fdb813;
            background: white;
            color: black;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .filter-btn:hover {
            background: #fdd98f;
            border-color: #fdb813;
            color: black;
        }

        .filter-btn.active {
            background: #fdb813;
            color: black;
            border-color: #fdb813;
        }

        .filter-btn.error,
        .filter-btn.warning,
        .filter-btn.info {
            border-color: #fdb813;
            color: black;
            font-weight: 700;
        }

        .filter-btn.error.active,
        .filter-btn.warning.active,
        .filter-btn.info.active {
            background: #fdb813;
            color: black;
            border-color: #fdb813;
        }

        .log-viewer {
            padding: 30px;
            min-height: 600px;
            max-height: 1150px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 15px;
            line-height: 1.8;
            background: #1e1e1e;
            color: #d4d4d4;
        }

        .log-line {
            padding: 6px 10px;
            margin: 3px 0;
            border-radius: 6px;
            white-space: pre-wrap;
            word-wrap: break-word;
            position: relative;
            padding-right: 80px;
        }

        .log-line:hover .copy-btn {
            opacity: 1;
        }

        .copy-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: #fdb813;
            color: black;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.2s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .copy-btn:hover {
            background: #e6a00a;
            transform: translateY(-50%) scale(1.05);
        }

        .copy-btn.copied {
            background: #28a745;
            opacity: 1;
        }

        .log-line.error {
            background: rgba(220, 53, 69, 0.2);
            border-left: 4px solid #dc3545;
            color: #ff6b6b;
        }

        .log-line.warning {
            background: rgba(255, 193, 7, 0.2);
            border-left: 4px solid #ffc107;
            color: #ffd93d;
        }

        .log-line.info {
            background: rgba(23, 162, 184, 0.1);
            border-left: 4px solid #17a2b8;
            color: #4dd0e1;
        }

        .log-line.debug {
            color: #9e9e9e;
        }

        .log-line.hidden {
            display: none;
        }

        .timestamp {
            color: #4ec9b0;
            font-weight: 600;
        }

        .level {
            font-weight: bold;
            margin: 0 8px;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #6c757d;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 25px;
            opacity: 0.5;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 8px 16px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #fdb813;
        }

        .no-errors-message {
            text-align: center;
            padding: 50px 20px;
            background: rgba(40, 167, 69, 0.1);
            border-radius: 10px;
            margin: 20px;
        }

        .no-errors-message h3 {
            color: #28a745;
            font-size: 28px;
            margin-bottom: 15px;
        }

        .no-errors-message p {
            color: #6c757d;
            font-size: 16px;
        }

        .navigation {
            padding: 15px 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            display: none;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .go-to-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .go-to-row input {
            width: 80px;
            padding: 6px 10px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
        }

        .go-to-row input:focus {
            outline: none;
            border-color: #fdb813;
        }

        .go-to-row button {
            padding: 6px 14px;
            border: 2px solid #fdb813;
            background: white;
            color: black;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .go-to-row button:hover {
            background: #fdb813;
            color: black;
        }

        .nav-btn {
            padding: 8px 16px;
            border: 2px solid #fdb813;
            background: white;
            color: black;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nav-btn.jump {
            border-color: #fdb813;
            color: black;
        }

        .nav-btn.jump:hover:not(:disabled) {
            background: #fdb813;
            color: black;
        }

        .nav-btn:hover:not(:disabled) {
            background: #fdb813;
            color: black;
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            border-color: #dee2e6;
            color: #dee2e6;
        }

        .nav-info {
            font-size: 16px;
            color: #6c757d;
            font-weight: 600;
        }

        .log-line.selected {
            background: rgba(102, 126, 234, 0.3) !important;
            border-left: 4px solid #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Promega Log File Analyzer</h1>
            <p>Upload your .log file to automatically detect and highlight errors, warnings, and other log levels</p>
        </div>

        <div class="upload-section">
            <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Choose Log File</button>
            <input type="file" id="fileInput" accept=".log,.txt" style="display: none;">
            <p id="fileName" style="margin-top: 15px; color: #ffffff; font-size: 16px;"></p>
        </div>

        <div class="stats" id="stats" style="display: none;">
            <div class="stat-item">
                <div class="stat-value" id="totalLines">0</div>
                <div class="stat-label">Total Lines</div>
            </div>
            <div class="stat-item errors">
                <div class="stat-value" id="errorCount">0</div>
                <div class="stat-label">Errors</div>
            </div>
            <div class="stat-item warnings">
                <div class="stat-value" id="warningCount">0</div>
                <div class="stat-label">Warnings</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="infoCount">0</div>
                <div class="stat-label">Info</div>
            </div>
        </div>

        <div class="filters" id="filters" style="display: none;">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn error" data-filter="error">Errors Only</button>
            <button class="filter-btn warning" data-filter="warning">Warnings Only</button>
            <button class="filter-btn info" data-filter="info">Info Only</button>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search in logs...">
            </div>
        </div>

        <div class="navigation" id="navigation">
            <button class="nav-btn" id="prevBtn">
                <span>◀</span> Previous
            </button>
            <div class="nav-info" id="navInfo">Error 1 of 5</div>
            <button class="nav-btn" id="nextBtn">
                Next <span>▶</span>
            </button>
            <button class="nav-btn jump" id="lastErrorBtn">
                Go to Last Error <span>⏭</span>
            </button>
            <button class="nav-btn" id="bulkCopyBtn" disabled>
                Copy Selected <span>📋</span>
            </button>
            <button class="nav-btn" id="downloadBtn" disabled>
                Download Selected <span>⬇️</span>
            </button>
            <div class="go-to-row">
                <label style="font-size: 14px; color: #6c757d; font-weight: 600;">Go to Row:</label>
                <input type="number" id="rowInput" min="1" placeholder="Line #">
                <button id="goToRowBtn">Go</button>
            </div>
        </div>

        <div class="log-viewer" id="logViewer">
            <div class="empty-state">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
                <h3>No log file loaded</h3>
                <p>Upload a .log file to begin analysis</p>
            </div>
        </div>
    </div>

    <script>
        let allLines = [];
        let currentFilter = 'all';
        let searchTerm = '';
        let errorWarningLines = [];
        let currentErrorIndex = 0;
        let selectedIndices = new Set();

        const fileInput = document.getElementById('fileInput');
        const logViewer = document.getElementById('logViewer');
        const fileName = document.getElementById('fileName');
        const stats = document.getElementById('stats');
        const filters = document.getElementById('filters');
        const searchInput = document.getElementById('searchInput');
        const navigation = document.getElementById('navigation');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const navInfo = document.getElementById('navInfo');
        const lastErrorBtn = document.getElementById('lastErrorBtn');
        const rowInput = document.getElementById('rowInput');
        const goToRowBtn = document.getElementById('goToRowBtn');
        const bulkCopyBtn = document.getElementById('bulkCopyBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        fileInput.addEventListener('change', handleFileSelect);
        searchInput.addEventListener('input', handleSearch);
        prevBtn.addEventListener('click', () => navigateError(-1));
        nextBtn.addEventListener('click', () => navigateError(1));
        lastErrorBtn.addEventListener('click', jumpToLastError);
        goToRowBtn.addEventListener('click', goToRow);
        rowInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') goToRow();
        });

        bulkCopyBtn.addEventListener('click', () => {
            const selectedLines = Array.from(selectedIndices).map(index => {
                const line = allLines.find(l => l.index === index);
                return line ? `${line.index}: ${line.text}` : '';
            }).filter(text => text);
            const text = selectedLines.join('\n');
            navigator.clipboard.writeText(text).then(() => {
                bulkCopyBtn.innerHTML = '✓ Copied <span>📋</span>';
                setTimeout(() => {
                    bulkCopyBtn.innerHTML = 'Copy Selected <span>📋</span>';
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
                bulkCopyBtn.innerHTML = '✗ Failed <span>📋</span>';
                setTimeout(() => {
                    bulkCopyBtn.innerHTML = 'Copy Selected <span>📋</span>';
                }, 2000);
            });
        });

        downloadBtn.addEventListener('click', () => {
            const selectedLines = Array.from(selectedIndices).sort((a, b) => a - b).map(index => {
                const line = allLines.find(l => l.index === index);
                return line ? `${line.index}: ${line.text}` : '';
            }).filter(text => text);
            const text = selectedLines.join('\n');
            
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'selected_logs.txt';
            a.click();
            URL.revokeObjectURL(url);
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderLogs();
            });
        });

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;

            fileName.textContent = `📄 ${file.name}`;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                const content = event.target.result;
                parseLog(content);
            };
            reader.readAsText(file);
        }

        function parseLog(content) {
            const lines = content.split('\n');
            allLines = [];
            selectedIndices = new Set();
            
            let errorCount = 0;
            let warningCount = 0;
            let infoCount = 0;

            lines.forEach((line, index) => {
                if (!line.trim()) return;

                let level = 'debug';
                const lineLower = line.toLowerCase();

                if (lineLower.includes('error') || lineLower.includes('fatal') || lineLower.includes('exception')) {
                    level = 'error';
                    errorCount++;
                } else if (lineLower.includes('warn')) {
                    level = 'warning';
                    warningCount++;
                } else if (lineLower.includes('info')) {
                    level = 'info';
                    infoCount++;
                }

                allLines.push({
                    text: line,
                    level: level,
                    index: index + 1
                });
            });

            document.getElementById('totalLines').textContent = allLines.length;
            document.getElementById('errorCount').textContent = errorCount;
            document.getElementById('warningCount').textContent = warningCount;
            document.getElementById('infoCount').textContent = infoCount;

            stats.style.display = 'flex';
            filters.style.display = 'flex';

            errorWarningLines = allLines.filter(line => line.level === 'error' || line.level === 'warning');
            
            navigation.style.display = 'flex';
            if (errorWarningLines.length > 0) {
                currentErrorIndex = 0;
                updateNavigationInfo();
            } else {
                navInfo.textContent = '';
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                lastErrorBtn.disabled = true;
            }

            renderLogs();
        }

        function handleSearch(e) {
            searchTerm = e.target.value.toLowerCase();
            renderLogs();
        }

        function renderLogs() {
            logViewer.innerHTML = '';

            const filtered = allLines.filter(line => {
                const matchesFilter = currentFilter === 'all' || line.level === currentFilter;
                const matchesSearch = searchTerm === '' || line.text.toLowerCase().includes(searchTerm);
                return matchesFilter && matchesSearch;
            });

            if (filtered.length === 0) {
                logViewer.innerHTML = '<div class="empty-state"><h3>No matching logs found</h3><p>Try adjusting your filters or search term</p></div>';
                return;
            }

            const hasErrorsOrWarnings = allLines.some(line => line.level === 'error' || line.level === 'warning');
            
            if (!hasErrorsOrWarnings) {
                logViewer.innerHTML = `
                    <div class="no-errors-message">
                        <h3>✅ No errors here</h3>
                        <p>Your log file looks clean - no errors or warnings detected!</p>
                    </div>
                `;
            }

            const fragment = document.createDocumentFragment();

            filtered.forEach(line => {
                const div = document.createElement('div');
                div.className = `log-line ${line.level}`;
                div.id = `line-${line.index}`;
                
                const lineNumber = `<span style="color: #858585; margin-right: 10px;">${line.index}</span>`;
                div.innerHTML = lineNumber + escapeHtml(line.text);
                
                if (selectedIndices.has(line.index)) {
                    div.classList.add('selected');
                }
                
                fragment.appendChild(div);

                div.addEventListener('click', () => {
                    div.classList.toggle('selected');
                    if (div.classList.contains('selected')) {
                        selectedIndices.add(line.index);
                    } else {
                        selectedIndices.delete(line.index);
                    }
                    bulkCopyBtn.disabled = selectedIndices.size === 0;
                    downloadBtn.disabled = selectedIndices.size === 0;
                });
            });

            logViewer.appendChild(fragment);

            const visibleSelected = document.querySelectorAll('.log-line.selected');
            bulkCopyBtn.disabled = visibleSelected.length === 0;
            downloadBtn.disabled = visibleSelected.length === 0;
        }

        function copyLine(lineIndex, btnElement) {
            const line = allLines.find(l => l.index === lineIndex);
            if (!line) return;
            
            navigator.clipboard.writeText(line.text).then(() => {
                btnElement.textContent = '✓ Copied';
                btnElement.classList.add('copied');
                
                setTimeout(() => {
                    btnElement.textContent = 'Copy';
                    btnElement.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
                btnElement.textContent = '✗ Failed';
                setTimeout(() => {
                    btnElement.textContent = 'Copy';
                }, 2000);
            });
        }

        function navigateError(direction) {
            currentErrorIndex += direction;
            
            if (currentErrorIndex < 0) currentErrorIndex = 0;
            if (currentErrorIndex >= errorWarningLines.length) currentErrorIndex = errorWarningLines.length - 1;
            
            updateNavigationInfo();
            scrollToError();
        }

        function updateNavigationInfo() {
            const total = errorWarningLines.length;
            navInfo.textContent = `Error/Warning ${currentErrorIndex + 1} of ${total}`;
            
            prevBtn.disabled = currentErrorIndex === 0;
            nextBtn.disabled = currentErrorIndex === total - 1;
        }

        function scrollToError() {
            const errorLine = errorWarningLines[currentErrorIndex];
            const element = document.getElementById(`line-${errorLine.index}`);
            
            if (element) {
                document.querySelectorAll('.log-line.highlight').forEach(el => {
                    el.classList.remove('highlight');
                });
                
                element.classList.add('highlight');
                element.scrollIntoView({ behavior: 'smooth', block: 'center' });

                // Select the row
                document.querySelectorAll('.log-line.selected').forEach(el => el.classList.remove('selected'));
                element.classList.add('selected');
                selectedIndices.clear();
                selectedIndices.add(errorLine.index);
                bulkCopyBtn.disabled = false;
            }
        }

        function jumpToLastError() {
            if (errorWarningLines.length > 0) {
                currentErrorIndex = errorWarningLines.length - 1;
                updateNavigationInfo();
                scrollToError();
            }
        }

        function goToRow() {
            const rowNumber = parseInt(rowInput.value);
            
            if (!rowNumber || rowNumber < 1 || rowNumber > allLines.length) {
                rowInput.style.borderColor = '#dc3545';
                setTimeout(() => {
                    rowInput.style.borderColor = '#dee2e6';
                }, 1000);
                return;
            }

            const element = document.getElementById(`line-${rowNumber}`);
            
            if (element) {
                document.querySelectorAll('.log-line.highlight').forEach(el => {
                    el.classList.remove('highlight');
                });
                
                element.classList.add('highlight');
                element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                // Select the row
                document.querySelectorAll('.log-line.selected').forEach(el => el.classList.remove('selected'));
                element.classList.add('selected');
                selectedIndices.clear();
                selectedIndices.add(rowNumber);
                bulkCopyBtn.disabled = false;
                
                rowInput.value = '';
            } else {
                rowInput.style.borderColor = '#ffc107';
                setTimeout(() => {
                    rowInput.style.borderColor = '#dee2e6';
                }, 1000);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
